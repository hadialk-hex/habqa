services:
  postgres:
    image: postgres:17-alpine
    container_name: hubqa-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: hubqa
    ports:
      # Host port 5433: a WSL postgres instance already occupies 5432 on this machine
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hubqa"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
