version: '3.8'

# ─── CasaOS App Metadata ────────────────────────────────────────────────────
x-casaos:
  architectures:
    - amd64
    - arm64
  main: frontend
  title:
    en_us: Habqa
  description:
    en_us: Social media management platform with automated replies, unified inbox, and AI-powered responses.
    ar_sa: منصة إدارة التواصل الاجتماعي مع الردود الآلية، صندوق الوارد الموحد، والردود الذكية بالذكاء الاصطناعي.
  tagline:
    en_us: Automate your social media responses
    ar_sa: أتمت ردودك على وسائل التواصل الاجتماعي
  developer: hadialk-hex
  author: hadialk-hex
  icon: https://cdn-icons-png.flaticon.com/512/4712/4712035.png
  thumbnail: https://cdn-icons-png.flaticon.com/512/4712/4712035.png
  screenshot_link:
    - https://cdn-icons-png.flaticon.com/512/4712/4712035.png
  category: Business
  port_map: "1998"

# ─── Services ────────────────────────────────────────────────────────────────
services:

  postgres:
    image: postgres:17-alpine
    container_name: hubqa_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hubqa
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hubqa"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    labels:
      icon: "https://cdn-icons-png.flaticon.com/512/8617/8617551.png"
      casaos.name: "Habqa - قاعدة البيانات"
      casaos.description.en_us: "PostgreSQL database for Habqa"
      casaos.description.ar_sa: "قاعدة بيانات PostgreSQL لتطبيق Habqa"

  redis:
    image: redis:7-alpine
    container_name: hubqa_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    labels:
      icon: "https://cdn-icons-png.flaticon.com/512/6132/6132222.png"
      casaos.name: "Habqa - التخزين المؤقت"
      casaos.description.en_us: "Redis cache for Habqa"
      casaos.description.ar_sa: "ذاكرة التخزين المؤقت Redis لتطبيق Habqa"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hubqa_backend
    restart: always
    ports:
      - "1999:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:password@postgres:5432/hubqa?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: supersecretjwtkey1234567890
      ALLOWED_ORIGINS: http://localhost:1998
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (res) => res.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    labels:
      icon: "https://cdn-icons-png.flaticon.com/512/4712/4712035.png"
      casaos.name: "Habqa - الخادم (API)"
      casaos.description.en_us: "Habqa backend API server (NestJS)"
      casaos.description.ar_sa: "خادم API الخلفي لتطبيق Habqa (NestJS)"
      casaos.main.port.number: "1999"
      casaos.main.port.protocol: "http"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hubqa_frontend
    restart: always
    ports:
      - "1998:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      BACKEND_URL: http://backend:3001
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    labels:
      icon: "https://cdn-icons-png.flaticon.com/512/4712/4712035.png"
      casaos.name: "Habqa - الواجهة"
      casaos.description.en_us: "Habqa frontend web application (Next.js)"
      casaos.description.ar_sa: "واجهة تطبيق Habqa (Next.js)"
      casaos.main.port.number: "1998"
      casaos.main.port.protocol: "http"
      casaos.main.port.path: "/"
      casaos.thumbnail: "https://cdn-icons-png.flaticon.com/512/4712/4712035.png"

volumes:
  postgres_data:
