version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: hubqa_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hubqa
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hubqa"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: hubqa_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hubqa_backend
    restart: always
    ports:
      - "1999:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:password@postgres:5432/hubqa?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: supersecretjwtkey1234567890
      ALLOWED_ORIGINS: http://localhost:1998
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (res) => res.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    labels:
      icon: "https://cdn-icons-png.flaticon.com/512/4712/4712035.png"
      casaos.name: "Habqa Backend (API)"
      casaos.category: "Developer"
      casaos.main.port.number: "1999"
      casaos.main.port.protocol: "http"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hubqa_frontend
    restart: always
    ports:
      - "1998:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # API calls go through the Next.js same-origin proxy (/api/backend)
      # which forwards to the backend container internally
      BACKEND_URL: http://backend:3001
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    labels:
      icon: "https://cdn-icons-png.flaticon.com/512/4712/4712035.png"
      casaos.name: "Habqa"
      casaos.description: "منصة إدارة التواصل الاجتماعي والردود الآلية"
      casaos.category: "Business"
      casaos.main.port.number: "1998"
      casaos.main.port.protocol: "http"
      casaos.main.port.path: "/"
      casaos.thumbnail: "https://cdn-icons-png.flaticon.com/512/4712/4712035.png"


volumes:
  postgres_data:
